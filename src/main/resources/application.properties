spring.application.name=Employee Payroll Management System
server.port=${PORT:8080}
server.forward-headers-strategy=framework



# PostgreSQL datasource — prefer environment variables for credentials
# Set these in your environment or in a startup script for production.
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/payrolldb}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${JDBC_DATABASE_USERNAME:payroll}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:changeme}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

payroll.app.open-browser=${PAYROLL_OPEN_BROWSER:true}
payroll.app.public-url=http://localhost:8080
