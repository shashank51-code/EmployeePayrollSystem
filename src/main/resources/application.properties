spring.application.name=Employee Payroll Management System
server.port=${PORT:8080}
server.forward-headers-strategy=framework

spring.datasource.url=jdbc:h2:file:./data/payroll-db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

payroll.app.open-browser=${PAYROLL_OPEN_BROWSER:true}
payroll.app.public-url=https://employeepayrollsystem-production.up.railway.app
